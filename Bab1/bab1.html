    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #f0f4f8;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      h1 {
        color: #2c3e50;
        margin-bottom: 10px;
        font-size: 24px;
        text-align: center;
      }

      .progress {
        color: #7f8c8d;
        margin-bottom: 20px;
        font-weight: bold;
      }

      /* Container Flashcard */
      .card-container {
        width: 350px;
        height: 250px;
        perspective: 1000px;
        cursor: pointer;
        margin-bottom: 30px;
      }

      .card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        border-radius: 15px;
      }

      .card.flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 15px;
        padding: 20px;
        text-align: center;
      }

      /* Bagian Depan (Jepang) */
      .card-front {
        background-color: #ffffff;
        color: #333;
        border: 2px solid #3498db;
      }

      .japanese-text {
        font-size: 28px;
        font-weight: bold;
        color: #2c3e50;
      }

      .hint-front {
        font-size: 12px;
        color: #95a5a6;
        margin-top: 15px;
      }
      .hint-back {
        font-size: 12px;
        color: #ffffff;
        margin-top: 15px;
      }

      /* Bagian Belakang (Indonesia) */
      .card-back {
        background-color: #3498db;
        color: white;
        transform: rotateY(180deg);
      }

      .indonesian-text {
        font-size: 24px;
        font-weight: 500;
      }

      /* Tombol Kontrol */
      .controls {
        display: flex;
        gap: 15px;
        width: 100%;
        max-width: 350px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-nav {
        background-color: #ffffff;
        color: #2c3e50;
        border: 1px solid #bdc3c7;
      }

      .btn-nav:hover {
        background-color: #ecf0f1;
      }

      .btn-action {
        background-color: #e67e22;
        color: white;
      }

      .btn-action:hover {
        background-color: #d35400;
      }
    </style>
  </head>

        <!-- Sisi Belakang (Bahasa Indonesia) -->

        </div>
      </div>
    </div>

      let cards = [...originalDataset];

      const progressEl = document.getElementById("progress");

      function flipCard() {
        cardEl.classList.toggle("flipped");
      }

      function updateCard() {
        cardEl.classList.remove("flipped");
        setTimeout(() => {
          jpTextEl.textContent = cards[currentIndex].jp;
          idTextEl.textContent = cards[currentIndex].id;
          progressEl.textContent = `${currentIndex + 1} / ${cards.length}`;
        }, 150);
      }

      function nextCard() {
        currentIndex = (currentIndex + 1) % cards.length;
        updateCard();
      }

      function prevCard() {
        currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        updateCard();
      }

      function shuffleCards() {
        for (let i = cards.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateCard();
        alert("🔀 Kartu telah diacak!");
